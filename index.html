<!doctype html>
<html>
  <head>
    <title>Login Page</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>
  <body>
    <div class="base">
      <div class="linkpage">
        <button class="exitbutton">x</button>
        <img src="twitterlogo.png" alt="twitter Logo" class="twitter" />
        <h1>Sign in to Twitter</h1>
        <button class="buttongoogle">
          <img src="googlelogo.png" alt="google Logo" />Sign in with Google
        </button>
        <button class="buttonapple">
          <img src="applelogo.png" alt="apple Logo" />
          <strong>Sign in with Apple</strong>
        </button>
        <div class="divider">or</div>
        <input
          type="text"
          class="info"
          placeholder="Phone, email, or username"
        />
        <button class="next">Next</button>
        <button class="password"><strong>Forgot password?</strong></button>
        <div class="signup">
          <p>Don't have an account? <a href="#">Sign up</a></p>
        </div>
      </div>
    </div>
  </body>
</html>
